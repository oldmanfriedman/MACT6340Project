      <body> 
        <container> 
          <section> 
            <div class="divider"></div> 
            <div id="contact-headline" class="beginning pt-5 m-2 text-light text-center"> 
              <h1>CONTACT</h1> 
            </div> 
          </section> 
          <section> 
            <div class="row justify-content-center text-start form-holder"> 
              <div class="col-10"> 
                <form id="contact-form" class="p-3 needs-validation rounded" novalidate> 
                  <div class="row justify-content-start mb-2"> 
                    <div class="row"> 
                      <!-- First name --> 
                       <div class="col-4 m-2"> 
                        <label for="contact-first" class="form-label">FIRST NAME</label> 
                        <input type="text" class="form-control" id="contact-first" required> 
                        <div class="invalid-feedback"> 
                          ENTER YOUR FIRST NAME. 
                        </div> 
                      </div> 
                      <!-- Last name--> 
                       <div class="col-4 m-2"> 
                        <label for="contact-last" class="form-label">LAST NAME</label> 
                        <input type="text" class="form-control" id="contact-last" required> 
                        <div class="invalid-feedback"> 
                          ENTER YOUR LAST NAME. 
                        </div> 
                      </div> 
                    </div> 
                    <!-- Email address --> 
                     <div class="row"> 
                      <div class="col-7 m-2"> 
                        <label for="contact-email-addr" class="form-label">EMAIL ADDRESS</label> 
                        <input type="email" class="form-control" id="contact-email-addr" aria-describedby="contact-email-help" placeholder="name@example.com" required> <div class="invalid-feedback" id="contact-email-help"> 
                          FORMAT SHOULD BE NAME@EXAMPLE.COM. 
                        </div> 
                      </div> 
                    </div> 
                    <!-- Question and/or comment --> 
                     <div class="row"> 
                      <div class="col m-2"> 
                        <label for="contact-question" class="form-label">QUESTIONS OR COMMENTS</label> <div class="input-group has-validation"> 
                          <textarea class="form-control" id="contact-question" rows="7" maxlength="1000" aria-describedby="contact-question-help" required></textarea> 
                          <div id="contact-question-help" class="invalid-feedback"> 
                            ENTER YOUR QUESTIONS OR COMMENTS. 
                          </div> 
                        </div> 
                      </div> 
                    </div> 
                    <div class="col m-2"> 
                      <div> 
                        <button id="send-contact" name="sendContact" class="btn btn-primary" type="submit">SUBMIT FORM</button> 
                        <span class="m-2" id="contact-button-response"></span> 
                        <span class="m-2" id="result"></span> 
                      </div> 
                    </div> 
                  </form> 
                </div> 
              </div> 
            </section> 
          </container> 
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
